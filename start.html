<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트 시작</title>
    <style>
        h1 {color:red}
    </style>
    <script>
        // 내부 자바스크립트 작성위치 -1 (head) - 데이터 불러오기
        //h1 읽지못해 에러 - defer 사용시 가능 ** head에 자바스크립트 작성시 필수 // = defer 없이 html 동적 js를 아래파일에 작성하면 에러 -> defer 작성시 script 위치 무시하고 html 모두 읽은 후 script 처리 ㄱㄴ
    </script>
    <!-- 외부 자바스크립트 작성 -->
    <script src="./scripts/start.js" defer></script>
</head>
<body>
    <h1>제목</h1>
    <!-- 기본 HTML 작성위치 (script는 맨 아래에만 배치하기) -->
    <script>
        // 내부 자바스크립트 작성위치 -2 (body) -html 태그 읽은 후 동적처리
        //h1 읽고 처리가능
    </script>
    <script src="./scripts/start.js"></script>
</body>
</html>
